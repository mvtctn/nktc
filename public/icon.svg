<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#0f3460" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Siphonic pipe circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00f0ff" stroke-width="12" opacity="0.3" />
  
  <!-- Flow arrows / circular arcs -->
  <path d="M 120 256 A 136 136 0 0 1 392 256" fill="none" stroke="#00f0ff" stroke-width="8" stroke-dasharray="15 10" opacity="0.6" />
  <path d="M 392 256 A 136 136 0 0 1 120 256" fill="none" stroke="#00f0ff" stroke-width="8" stroke-dasharray="15 10" opacity="0.6" />

  <!-- Hydrotech Water Drop Symbol -->
  <path d="M 256 90 
           C 256 90, 350 220, 350 290 
           A 94 94 0 1 1 162 290 
           C 162 220, 256 90, 256 90 Z" 
        fill="url(#dropGrad)" 
        filter="url(#glow)" />
        
  <!-- Siphonic drainage vortex line -->
  <path d="M 230 270 Q 256 250 282 270 T 256 310" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8" />
  <path d="M 240 285 Q 256 275 272 285 T 256 305" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />

  <!-- Text Hydrotech -->
  <text x="256" y="440" font-family="'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4">HYDROTECH</text>
  <text x="256" y="470" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#00f0ff" text-anchor="middle" letter-spacing="2">NKTC ASSISTANT</text>
</svg>
